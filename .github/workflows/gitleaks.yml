name: gitleaks
on: [pull_request, push, workflow_dispatch]
jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Upgrade to v4 for better performance
        with:
          fetch-depth: 0           # Crucial: Gets the entire history
      
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          # This 'args' line is the secret sauce. 
          # It tells Gitleaks to be loud (--verbose) and 
          # to scan the whole source (--source .)
          args: detect --verbose --source . --redact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
