name: gitleaks
on: [pull_request, push, workflow_dispatch]
jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: gitleaks/gitleaks-action@v2
        with:
          # This forces Gitleaks to scan all files, not just the diff
          args: detect --no-git --source . --verbose --redact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
